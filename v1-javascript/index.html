<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格斗游戏 - 原生 JavaScript 版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: sans-serif; overflow: hidden;
        }
        #game-container {
            position: relative; width: 800px; height: 400px;
            background: linear-gradient(to bottom, #16213e 0%, #1a1a2e 60%, #2d2d2d 100%);
            border: 2px solid #e94560; border-radius: 8px; overflow: hidden;
        }
        #stage { position: relative; width: 100%; height: 100%; }
        #ground {
            position: absolute; bottom: 0; width: 100%; height: 80px;
            background: linear-gradient(to top, #2d2d2d 0%, #3d3d3d 50%, transparent 100%);
        }
        #player {
            position: absolute; bottom: 0; left: 100px;
            width: 60px; height: 80px; background: #e94560; transition: background 0.1s;
        }
        #player.face-left { background: #c73650; transform: scaleX(-1); }
        #player.face-right { transform: scaleX(1); }
        #player.attacking { background: #ff6b6b; box-shadow: 0 0 15px #ff6b6b; }
        
        /* 玩家拳头特效 */
        #player-first {
            width: 10px; height: 10px;
            background-color: yellow;
            position: absolute;
            top: 20px;
            opacity: 0;
        }
        #player.attacking #player-first {
            opacity: 1;
            right: -50px;
        }

        #enemy {
            position: absolute; bottom: 0; right: 200px;
            width: 50px; height: 80px; background: #0f3460; transition: background 0.1s;
        }
        #enemy.face-left { background: #0a2648; transform: scaleX(-1); }
        #enemy.face-right { transform: scaleX(1); }
        #enemy.attacking { background: #533483; box-shadow: 0 0 15px #533483; }
        #enemy.hit, #player.hit { background: #ff4757; }
        
        #ground-line {
            position: absolute; bottom: 80px; width: 100%; height: 2px;
            background: #e94560; opacity: 0.5;
        }
        #enemy-health-bar {
            position: absolute; bottom: 100px; left: -25px;
            width: 100px; height: 15px; background: #333;
            border: 1px solid #555; border-radius: 3px;
        }
        #enemy-health-fill {
            width: 100%; height: 100%; background: #e94560;
            border-radius: 2px; transition: width 0.3s;
        }
        #stage.shake { animation: shake 0.1s ease-in-out; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        #controls {
            position: absolute; bottom: 10px; left: 50%;
            transform: translateX(-50%); color: #888; font-size: 11px; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="stage">
            <div id="ground"></div>
            <div id="ground-line"></div>
            <div id="player">
                <div id="player-first"></div>
            </div>
            <div id="enemy">
                <div id="enemy-health-bar">
                    <div id="enemy-health-fill"></div>
                </div>
            </div>
            <div id="controls">A/D: 移动 | 空格: 跳跃 | J: 攻击</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
